<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pest-ex Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- jsPDF for PDF generation -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{--navy:#0d1b2e;--navy-mid:#162540;--navy-light:#e8edf4;--red:#e01a1a;--red-light:#fdeaea;--white:#fff;--light:#f2f5f9;--border:#cdd5e0;--mid:#4a556a;--dark:#0d1b2e;--green:#1a7a3a;--green-light:#e6f4ea;--radius:10px;--shadow:0 2px 12px rgba(13,27,46,0.12);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Barlow',sans-serif;background:var(--light);color:var(--dark);min-height:100vh;}

  /* LOGIN */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy);padding:20px;}
  .login-box{background:white;border-radius:16px;padding:36px 28px;width:100%;max-width:380px;text-align:center;border-top:4px solid var(--red);}
  .login-box img{height:52px;margin-bottom:20px;border-radius:8px;}
  .login-box h2{font-family:'Barlow Condensed',sans-serif;font-size:24px;color:var(--navy);margin-bottom:4px;}
  .login-box p{font-size:13px;color:var(--mid);margin-bottom:24px;}
  .login-field{text-align:left;margin-bottom:14px;}
  .login-field label{font-size:12px;font-weight:600;color:var(--mid);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.3px;}
  .login-field input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:11px 14px;font-size:15px;font-family:'Barlow',sans-serif;outline:none;transition:border-color 0.2s;}
  .login-field input:focus{border-color:var(--navy);}
  .login-btn{width:100%;background:var(--red);color:white;border:none;border-radius:10px;padding:13px;font-size:16px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;cursor:pointer;margin-top:6px;}
  .login-btn:hover{background:#c01515;}
  .login-error{font-size:12px;color:var(--red);margin-top:10px;display:none;}

  /* DASHBOARD */
  .dash{display:none;}
  .dash-header{background:var(--navy);color:white;padding:0;box-shadow:0 3px 10px rgba(0,0,0,0.3);position:sticky;top:0;z-index:100;}
  .dash-header-inner{display:flex;align-items:center;padding:10px 20px;gap:14px;border-bottom:3px solid var(--red);}
  .dash-header img{height:40px;border-radius:6px;flex-shrink:0;}
  .dash-header h1{font-family:'Barlow Condensed',sans-serif;font-size:20px;letter-spacing:0.5px;flex:1;}
  .dash-header p{font-size:11px;opacity:0.6;}
  .logout-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);color:white;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;}
  .logout-btn:hover{background:rgba(255,255,255,0.2);}

  /* STATS BAR */
  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 20px;background:white;border-bottom:1px solid var(--border);}
  .stat-card{text-align:center;padding:12px;background:var(--light);border-radius:var(--radius);}
  .stat-card .num{font-family:'Barlow Condensed',sans-serif;font-size:28px;color:var(--navy);line-height:1;}
  .stat-card .lbl{font-size:11px;color:var(--mid);margin-top:3px;}

  /* TOOLBAR */
  .toolbar{display:flex;gap:10px;padding:14px 20px;background:white;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
  .toolbar input[type="text"]{flex:1;min-width:180px;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:14px;font-family:'Barlow',sans-serif;outline:none;}
  .toolbar input:focus{border-color:var(--navy);}
  .filter-btn{padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;background:var(--light);font-size:13px;font-weight:600;cursor:pointer;color:var(--mid);font-family:'Barlow',sans-serif;white-space:nowrap;}
  .filter-btn.active{background:var(--navy);border-color:var(--navy);color:white;}
  .refresh-btn{padding:8px 14px;border:1.5px solid var(--navy);border-radius:8px;background:var(--navy);color:white;font-size:13px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;}

  /* REPORTS TABLE */
  .reports-wrap{padding:16px 20px;}
  .reports-table{width:100%;border-collapse:collapse;background:white;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
  .reports-table th{background:var(--navy);color:white;padding:11px 14px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:0.5px;text-transform:uppercase;}
  .reports-table td{padding:11px 14px;border-bottom:1px solid var(--light);font-size:13px;vertical-align:middle;}
  .reports-table tr:last-child td{border-bottom:none;}
  .reports-table tr:hover td{background:#f8fafc;}
  .type-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;}
  .type-badge.termite{background:var(--navy-light);color:var(--navy);}
  .type-badge.pest{background:var(--red-light);color:var(--red);}
  .action-btn{padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'Barlow',sans-serif;margin-right:4px;}
  .view-btn{background:var(--navy-light);color:var(--navy);}
  .pdf-btn{background:var(--red-light);color:var(--red);}
  .action-btn:hover{opacity:0.8;}
  .loading{text-align:center;padding:40px;color:var(--mid);font-size:14px;}
  .empty{text-align:center;padding:50px 20px;color:var(--mid);}
  .empty .icon{font-size:40px;margin-bottom:12px;}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(13,27,46,0.6);z-index:999;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
  .modal-overlay.show{display:flex;}
  .modal{background:white;border-radius:14px;width:100%;max-width:680px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
  .modal-header{background:var(--navy);color:white;padding:16px 20px;display:flex;align-items:center;gap:12px;border-bottom:3px solid var(--red);}
  .modal-header img{height:36px;border-radius:5px;}
  .modal-header h2{font-family:'Barlow Condensed',sans-serif;font-size:18px;flex:1;}
  .modal-close{background:rgba(255,255,255,0.15);border:none;color:white;width:30px;height:30px;border-radius:6px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .modal-body{padding:20px;max-height:70vh;overflow-y:auto;}
  .modal-footer{padding:14px 20px;background:var(--light);border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
  .modal-footer button{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;}
  .btn-pdf{background:var(--red);color:white;}
  .btn-close{background:var(--light);color:var(--mid);border:1.5px solid var(--border)!important;border:none;}
  /* Report sections in modal */
  .r-section{margin-bottom:16px;}
  .r-section h3{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--navy);border-bottom:2px solid var(--navy-light);padding-bottom:6px;margin-bottom:10px;display:flex;align-items:center;gap:5px;}
  .r-section h3::before{content:'';display:inline-block;width:3px;height:12px;background:var(--red);border-radius:2px;}
  .r-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--light);font-size:13px;}
  .r-row:last-child{border-bottom:none;}
  .r-key{color:var(--mid);}
  .r-val{font-weight:600;text-align:right;}
  .r-val.yes{color:var(--green);}
  .r-val.no{color:var(--red);}
  .sig-img{max-width:100%;height:55px;border:1px solid var(--border);border-radius:6px;margin-top:6px;}
  .photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .photo-grid img{width:80px;height:80px;object-fit:cover;border-radius:6px;border:1px solid var(--border);}
  .hygiene-box{background:#eaf4ff;border:1px solid #3a7ec8;border-radius:8px;padding:12px;font-size:12px;color:#1a3a60;line-height:1.6;margin-top:8px;}
  .pet-box{background:#fff8e6;border:1px solid #f0c040;border-radius:8px;padding:10px;font-size:12px;color:#7a5500;line-height:1.5;margin-top:6px;}
  .report-footer-block{background:var(--navy-light);border-radius:8px;padding:12px;text-align:center;margin-top:16px;font-size:11px;color:var(--mid);line-height:1.8;}
  .report-footer-block strong{color:var(--navy);}
</style>
</head>

let allReports = [];
let currentFilter = 'all';
let currentReport = null;

// ── AUTH ──
async function doLogin() {
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-password').value;
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    document.getElementById('login-error').style.display = 'block';
    return;
  }
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('admin-email-display').textContent = email;
  showDash();
}

async function doLogout() {
  await sb.auth.signOut();
  document.getElementById('dash').style.display = 'none';
  document.getElementById('login-wrap').style.display = 'flex';
}

async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    document.getElementById('admin-email-display').textContent = session.user.email;
    showDash();
  }
}

function showDash() {
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('dash').style.display = 'block';
  loadReports();
}

// ── LOAD REPORTS ──
async function loadReports() {
  document.getElementById('reports-container').innerHTML = '<div class="loading">Loading reports…</div>';
  const { data, error } = await sb.from('reports').select('*').order('submitted_at', { ascending: false });
  if (error) { document.getElementById('reports-container').innerHTML = '<div class="loading">Error loading reports: ' + error.message + '</div>'; return; }
  allReports = data || [];
  updateStats();
  renderTable();
}

function updateStats() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('stat-total').textContent = allReports.length;
  document.getElementById('stat-today').textContent = allReports.filter(r => r.submitted_at && r.submitted_at.startsWith(today)).length;
  document.getElementById('stat-termite').textContent = allReports.filter(r => r.report_type === 'Termite Bait Monitoring').length;
  document.getElementById('stat-pest').textContent = allReports.filter(r => r.report_type === 'General Pest Control').length;
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('filter-' + f).classList.add('active');
  renderTable();
}

function filterReports() { renderTable(); }

function renderTable() {
  const search = document.getElementById('search-input').value.toLowerCase();
  let rows = allReports.filter(r => {
    if (currentFilter === 'termite' && r.report_type !== 'Termite Bait Monitoring') return false;
    if (currentFilter === 'pest' && r.report_type !== 'General Pest Control') return false;
    if (search) {
      const hay = [r.client, r.technician, r.address, r.ref].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
  if (!rows.length) {
    document.getElementById('reports-container').innerHTML = '<div class="empty"><div class="icon">📋</div><p>No reports found.</p></div>';
    return;
  }
  const html = `<table class="reports-table">
    <thead><tr>
      <th>Ref</th><th>Date</th><th>Type</th><th>Client</th><th>Technician</th><th>Address</th><th>Actions</th>
    </tr></thead>
    <tbody>${rows.map((r, i) => {
      const isTermite = r.report_type === 'Termite Bait Monitoring';
      const date = r.visit_date || r.submitted_at?.split('T')[0] || '—';
      return `<tr>
        <td style="font-weight:700;color:var(--navy);font-size:12px">${r.ref||'—'}</td>
        <td>${date}</td>
        <td><span class="type-badge ${isTermite?'termite':'pest'}">${isTermite?'Termite':'Pest'}</span></td>
        <td style="font-weight:600">${r.client||'—'}</td>
        <td>${r.technician||'—'}</td>
        <td style="font-size:12px;color:var(--mid)">${r.address||'—'}</td>
        <td>
          <button class="action-btn view-btn" onclick="viewReport(${allReports.indexOf(r)})">View</button>
          <button class="action-btn pdf-btn" onclick="viewReport(${allReports.indexOf(r)},true)">PDF</button>
        </td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
  document.getElementById('reports-container').innerHTML = html;
}

// ── VIEW REPORT ──
function viewReport(idx, downloadNow=false) {
  currentReport = allReports[idx];
  const r = currentReport;
  const isTermite = r.report_type === 'Termite Bait Monitoring';
  document.getElementById('modal-title').textContent = r.report_type + ' — ' + (r.client||'');

  let photos = [];
  try { photos = JSON.parse(r.photos||'[]'); } catch(e){}
  const photoHTML = photos.length ? `<div class="photo-grid">${photos.map(p=>`<img src="${p}">`).join('')}</div>` : '<span style="font-size:12px;color:var(--mid)">No photos attached</span>';
  const sigHTML = r.signature ? `<img src="${r.signature}" class="sig-img">` : '<span style="font-size:12px;color:var(--mid)">No signature</span>';

  let bodyHTML = `
    <div style="background:var(--navy);color:white;border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;">
      <img src="${LOGO_B64}" style="height:36px;border-radius:4px;">
      <div style="flex:1"><div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;">${r.report_type}</div><div style="font-size:11px;opacity:0.65;">Pestex Pest Control Service Phil. Corp &nbsp;·&nbsp; (02) 8534-8380 &nbsp;·&nbsp; pest-ex.com.ph</div></div>
      <div style="text-align:right;font-size:11px;opacity:0.65;">REF: ${r.ref||'—'}<br>${r.visit_date||''}</div>
    </div>`;

  if (isTermite) {
    bodyHTML += `
      <div class="r-section"><h3>Site Details</h3>
        <div class="r-row"><span class="r-key">Client</span><span class="r-val">${r.client||'—'}</span></div>
        <div class="r-row"><span class="r-key">Address</span><span class="r-val">${r.address||'—'}</span></div>
        <div class="r-row"><span class="r-key">Visit Date</span><span class="r-val">${r.visit_date||'—'}</span></div>
        <div class="r-row"><span class="r-key">Technician</span><span class="r-val">${r.technician||'—'}</span></div>
      </div>
      <div class="r-section"><h3>Overall Site Check</h3>
        <div class="r-row"><span class="r-key">Activity Detected</span><span class="r-val ${r.activity_detected?.includes('YES')?'yes':'no'}">${r.activity_detected||'—'}</span></div>
        <div class="r-row"><span class="r-key">Evidence Found</span><span class="r-val ${r.evidence_found?.includes('YES')?'yes':'no'}">${r.evidence_found||'—'}</span></div>
        <div class="r-row"><span class="r-key">Maintenance Done</span><span class="r-val ${r.maintenance_done?.includes('YES')?'yes':'no'}">${r.maintenance_done||'—'}</span></div>
        <div class="r-row"><span class="r-key">Weather</span><span class="r-val">${r.weather||'—'}</span></div>
      </div>
      <div class="r-section"><h3>Bait Summary</h3>
        <div class="r-row"><span class="r-key">Bait Added</span><span class="r-val">${r.bait_grams||'—'}g</span></div>
        <div class="r-row"><span class="r-key">Product</span><span class="r-val">${r.bait_product||'—'}</span></div>
        <div class="r-row"><span class="r-key">Next Service</span><span class="r-val">${r.next_service||'—'}</span></div>
      </div>`;
  } else {
    bodyHTML += `
      <div class="r-section"><h3>Site Details</h3>
        <div class="r-row"><span class="r-key">Client</span><span class="r-val">${r.client||'—'}</span></div>
        <div class="r-row"><span class="r-key">Address</span><span class="r-val">${r.address||'—'}</span></div>
        <div class="r-row"><span class="r-key">Visit Date</span><span class="r-val">${r.visit_date||'—'}</span></div>
        <div class="r-row"><span class="r-key">Technician</span><span class="r-val">${r.technician||'—'}</span></div>
        <div class="r-row"><span class="r-key">Service Type</span><span class="r-val">${r.service_type||'—'}</span></div>
      </div>
      <div class="r-section"><h3>Pest Activity</h3>
        <div class="r-row"><span class="r-key">Activity Found</span><span class="r-val ${r.activity_found?.includes('YES')?'yes':'no'}">${r.activity_found||'—'}</span></div>
        <div class="r-row"><span class="r-key">Pest Level</span><span class="r-val">${r.pest_level||'—'}</span></div>
        <div class="r-row"><span class="r-key">Areas Affected</span><span class="r-val">${r.areas_affected||'—'}</span></div>
      </div>
      <div class="r-section"><h3>Treatment Applied</h3>
        <div class="r-row"><span class="r-key">Chemical / Product</span><span class="r-val">${r.chemical||'—'}</span></div>
        <div class="r-row"><span class="r-key">Method</span><span class="r-val">${r.method||'—'}</span></div>
        <div class="r-row"><span class="r-key">Volume</span><span class="r-val">${r.volume||'—'}</span></div>
        <div class="r-row"><span class="r-key">Areas Treated</span><span class="r-val">${r.areas_treated||'—'}</span></div>
      </div>
      <div class="r-section"><h3>Safety &amp; Compliance</h3>
        <div class="r-row"><span class="r-key">PPE Worn</span><span class="r-val">${r.ppe_worn||'—'}</span></div>
        <div class="r-row"><span class="r-key">Re-entry Period</span><span class="r-val">${r.reentry_period||'—'}</span></div>
        <div class="r-row"><span class="r-key">Pet Safety Advised</span><span class="r-val ${r.pet_safety_advised?.includes('YES')?'yes':'no'}">${r.pet_safety_advised||'—'}</span></div>
        <div class="pet-box"><strong>PET SAFETY:</strong> Dogs and cats must not re-enter treated areas for minimum 3 hours. Pesticide absorbs through paw pads.</div>
      </div>
      <div class="r-section"><h3>Follow-up &amp; Notes</h3>
        <div class="r-row"><span class="r-key">Follow-up Required</span><span class="r-val ${r.followup_required?.includes('YES')?'yes':'no'}">${r.followup_required||'—'}</span></div>
        <div class="r-row"><span class="r-key">Next Service Due</span><span class="r-val">${r.next_visit||'—'}</span></div>
        <div class="r-row"><span class="r-key">Hygiene Advisory Acknowledged</span><span class="r-val ${r.hygiene_acknowledged?.includes('YES')?'yes':'no'}">${r.hygiene_acknowledged||'—'}</span></div>
        <div class="hygiene-box"><strong>HYGIENE ADVISORY:</strong> Client must maintain high hygiene standards including daily bin emptying, sealed food storage, clean drains and behind equipment. Pest-ex cannot guarantee results where hygiene is not maintained.</div>
      </div>`;
  }

  bodyHTML += `
    <div class="r-section"><h3>Notes</h3>
      <p style="font-size:13px;line-height:1.6;padding:6px 0">${r.notes||'No notes recorded'}</p>
    </div>
    <div class="r-section"><h3>Site Photos</h3>${photoHTML}</div>
    <div class="r-section"><h3>Technician Signature</h3>${sigHTML}</div>

      Report Ref: ${r.ref||'—'} &nbsp;·&nbsp; Submitted: ${r.submitted_at ? new Date(r.submitted_at).toLocaleString('en-PH') : '—'}
    </div>`;

  document.getElementById('modal-body').innerHTML = bodyHTML;
  document.getElementById('modal-overlay').classList.add('show');
  if (downloadNow) setTimeout(downloadPDF, 300);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  currentReport = null;
}

// ── PDF DOWNLOAD ──
function downloadPDF() {
  if (!currentReport) return;
  const r = currentReport;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = 210, margin = 18;
  let y = 0;

  // Header block
  doc.setFillColor(13, 27, 46);
  doc.rect(0, 0, W, 28, 'F');
  doc.setFillColor(224, 26, 26);
  doc.rect(0, 28, W, 2, 'F');
  try { doc.addImage(LOGO_B64, 'JPEG', margin, 4, 28, 20); } catch(e){}
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold'); doc.setFontSize(14);
  doc.text(r.report_type, margin+32, 13);
  doc.setFont('helvetica','normal'); doc.setFontSize(8);
  doc.text('Pestex Pest Control Service Phil. Corp  ·  (02) 8534-8380  ·  pest-ex.com.ph', margin+32, 19);
  doc.setFontSize(8); doc.setTextColor(200,200,200);
  doc.text('REF: '+(r.ref||'—')+'   DATE: '+(r.visit_date||'—'), W-margin, 13, {align:'right'});
  y = 36;

  doc.setTextColor(13,27,46);

  function section(title) {
    if (y > 260) { doc.addPage(); y = 14; }
    doc.setFillColor(232, 237, 244);
    doc.rect(margin, y, W-margin*2, 7, 'F');
    doc.setFillColor(224,26,26); doc.rect(margin, y, 2, 7, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(9);
    doc.setTextColor(13,27,46);
    doc.text(title.toUpperCase(), margin+5, y+5);
    y += 10;
  }

  function row(key, val, highlight) {
    if (y > 272) { doc.addPage(); y = 14; }
    doc.setFont('helvetica','normal'); doc.setFontSize(9);
    doc.setTextColor(74, 85, 106); doc.text(key, margin+2, y);
    doc.setFont('helvetica','bold');
    if (highlight === 'yes') doc.setTextColor(26, 122, 58);
    else if (highlight === 'no') doc.setTextColor(224, 26, 26);
    else doc.setTextColor(13, 27, 46);
    doc.text(val||'—', W-margin, y, {align:'right'});
    doc.setDrawColor(220,225,232); doc.line(margin, y+2, W-margin, y+2);
    y += 8;
  }

  function textBlock(label, text, bgColor) {
    if (!text) return;
    if (y > 250) { doc.addPage(); y = 14; }
    if (label) { doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(74,85,106); doc.text(label, margin+2, y); y+=6; }
    const lines = doc.splitTextToSize(text, W-margin*2-4);
    const bh = lines.length*5+8;
    if (bgColor) { doc.setFillColor(...bgColor); doc.roundedRect(margin, y-2, W-margin*2, bh, 2, 2, 'F'); }
    doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(13,27,46);
    lines.forEach(line => { doc.text(line, margin+4, y+2); y+=5; });
    y += 6;
  }

  // Site Details
  section('Site Details');
  row('Client', r.client);
  row('Address', r.address);
  row('Visit Date', r.visit_date);
  row('Technician', r.technician);
  if (!( r.report_type === 'Termite Bait Monitoring')) row('Service Type', r.service_type);

  if (r.report_type === 'Termite Bait Monitoring') {
    section('Overall Site Check');
    row('Activity Detected', r.activity_detected, r.activity_detected?.includes('YES')?'yes':'no');
    row('Evidence Found', r.evidence_found, r.evidence_found?.includes('YES')?'yes':'no');
    row('Maintenance Done', r.maintenance_done, r.maintenance_done?.includes('YES')?'yes':'no');
    row('Weather', r.weather);
    section('Bait Summary');
    row('Bait Added (g)', r.bait_grams);
    row('Product Used', r.bait_product);
    row('Next Service', r.next_service);
  } else {
    section('Pest Activity');
    row('Activity Found', r.activity_found, r.activity_found?.includes('YES')?'yes':'no');
    row('Pest Level', r.pest_level);
    row('Areas Affected', r.areas_affected);
    section('Treatment Applied');
    row('Chemical / Product', r.chemical);
    row('Application Method', r.method);
    row('Volume Used', r.volume);
    row('Areas Treated', r.areas_treated);
    section('Safety & Compliance');
    row('PPE Worn', r.ppe_worn);
    row('Re-entry Period', r.reentry_period);
    row('Pet Safety Advised', r.pet_safety_advised, r.pet_safety_advised?.includes('YES')?'yes':'no');
    y += 2;
    textBlock(null, 'PET SAFETY: Dogs and cats must not re-enter treated areas for a minimum of 3 hours. Pesticide residue absorbs through paw pads.', [255,248,230]);
    section('Follow-up & Next Service');
    row('Follow-up Required', r.followup_required, r.followup_required?.includes('YES')?'yes':'no');
    row('Next Service Due', r.next_visit);
    row('Hygiene Advisory Acknowledged', r.hygiene_acknowledged, r.hygiene_acknowledged?.includes('YES')?'yes':'no');
    y += 2;
    textBlock(null, 'HYGIENE ADVISORY: Client must maintain high standards of cleanliness including daily bin emptying, sealed food storage, clean drains and equipment areas. Pest-ex cannot guarantee results where hygiene is not maintained between service visits.', [234,244,255]);
  }

  if (r.notes) { section('Technician Notes'); textBlock(null, r.notes); }

  // Signature
  if (r.signature) {
    if (y > 230) { doc.addPage(); y = 14; }
    section('Technician Signature');
    try { doc.addImage(r.signature, 'PNG', margin, y, 70, 20); y += 24; } catch(e){}
  }

  // Photos
  let photos = [];
  try { photos = JSON.parse(r.photos||'[]'); } catch(e){}
  if (photos.length) {
    if (y > 200) { doc.addPage(); y = 14; }
    section('Site Photos');
    let px = margin;
    photos.forEach((p, i) => {
      if (px + 42 > W - margin) { px = margin; y += 44; }
      if (y > 240) { doc.addPage(); y = 14; px = margin; }
      try { doc.addImage(p, 'JPEG', px, y, 38, 32); } catch(e){}
      px += 42;
    });
    y += 36;
  }

  // Footer
  if (y > 260) { doc.addPage(); y = 270; }
  y = Math.max(y + 6, 265);
  doc.setFillColor(232,237,244); doc.rect(margin, y, W-margin*2, 16, 'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(13,27,46);
  doc.text('Pestex Pest Control Service Phil. Corp', W/2, y+5, {align:'center'});
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(74,85,106);
  doc.text('PH (02) 8534-8380  ·  info@pest-ex.com.ph  ·  www.pest-ex.com.ph', W/2, y+10, {align:'center'});

  const filename = 'PestEx-Report-'+(r.ref||'')+'—'+(r.client||'').replace(/\s+/g,'-')+'.pdf';
  doc.save(filename);
}

// Close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Check session on load
checkSession();
</script>
